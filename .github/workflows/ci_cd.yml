name: Taskora CI/CD

# ─────────────────────────────────────────────────────────────
#  Triggers
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'           # e.g. v1.2.3  → triggers release jobs
  pull_request:
    branches: [main, develop]
  workflow_dispatch:      # Allows manual trigger from GitHub Actions tab

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────
#  Shared env
# ─────────────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: '3.32.6'
  JAVA_VERSION: '17'

# ══════════════════════════════════════════════════════════════
#  JOB 1 — Quality Gate  (runs on every push / PR)
# ══════════════════════════════════════════════════════════════
jobs:
  quality:
    name: 🔍 Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔍 Dart analyze
        run: flutter analyze --fatal-infos

      - name: 🧪 Unit & widget tests
        run: flutter test --coverage

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false

# ══════════════════════════════════════════════════════════════
#  JOB 2 — Android Build  (debug on every push, release on tag)
# ══════════════════════════════════════════════════════════════
  android:
    name: 🤖 Android Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      # ── Debug APK (always) ──────────────────────────────────
      - name: 🔨 Build Debug APK
        run: flutter build apk --debug

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: taskora-debug-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # ── Decode keystore (only if secret is present) ──────────
      - name: 🔑 Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && secrets.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/taskora-release.jks

      - name: 📝 Create key.properties
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && secrets.ANDROID_STORE_PASSWORD != ''
        run: |
          cat > android/key.properties <<EOF
          storeFile=taskora-release.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # ── Release APK (signed only if properties exist) ────────
      - name: 🚀 Build Release APK
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
        run: |
          if [ -f "android/key.properties" ]; then
            flutter build apk --release --obfuscate --split-debug-info=build/debug-info --build-number=${{ github.run_number }}
          else
            echo "⚠️ Skipping signed release build: Secrets missing. Building unsigned APK instead."
            flutter build apk --release
          fi

      - name: 📤 Upload Release APK
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: taskora-release-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: 📦 Build App Bundle (AAB)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && secrets.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          flutter build appbundle --release --obfuscate --split-debug-info=build/debug-info --build-number=${{ github.run_number }}

      - name: 📤 Upload AAB
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && secrets.ANDROID_KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: taskora-release-aab-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

      # ── Deploy to Play Store Internal Track (tags only) ─────
      - name: 🏪 Deploy to Play Store (Internal)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.taskora.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew

# ══════════════════════════════════════════════════════════════
#  JOB 3 — iOS Build  (no-codesign on push, signed on tags)
# ══════════════════════════════════════════════════════════════
  ios:
    name: 🍎 iOS Build
    runs-on: macos-latest
    needs: quality

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 📦 Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      # ── No-codesign build (PRs & develop) ──────────────────
      - name: 🔨 Build iOS (no-codesign)
        if: "!startsWith(github.ref, 'refs/tags/v') && github.ref != 'refs/heads/main'"
        run: |
          flutter build ios --release --no-codesign \
            --build-number=${{ github.run_number }}

      - name: 📤 Upload iOS artifact (no-codesign)
        if: "!startsWith(github.ref, 'refs/tags/v') && github.ref != 'refs/heads/main'"
        uses: actions/upload-artifact@v4
        with:
          name: taskora-ios-no-codesign-${{ github.sha }}
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

      # ── Signed build (main & tags) ──────────────────────────
      - name: 🔑 Import iOS Distribution Certificate
        env:
          CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && env.CERT_BASE64 != ''
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_CERT_PASSWORD }}
          keychain-password: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}

      - name: 📋 Install Provisioning Profile
        env:
          PROV_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && env.PROV_PROFILE_BASE64 != ''
        run: |
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_PATH"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "$PP_PATH/taskora.mobileprovision"

      - name: 🚀 Build iOS IPA (signed)
        env:
          CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && env.CERT_BASE64 != ''
        run: |
          flutter build ipa --release \
            --obfuscate \
            --split-debug-info=build/ios/debug-info \
            --build-number=${{ github.run_number }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: 📤 Upload IPA
        env:
          CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && env.CERT_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: taskora-ios-ipa-${{ github.run_number }}
          path: build/ios/ipa/*.ipa
          retention-days: 90

      # ── TestFlight deploy (only if API key secret exists) ───
      - name: ✈️ Upload to TestFlight
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        if: startsWith(github.ref, 'refs/tags/v') && env.APPSTORE_API_KEY_ID != ''
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/taskora.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

# ══════════════════════════════════════════════════════════════
#  JOB 4 — GitHub Release  (tags only)
# ══════════════════════════════════════════════════════════════
  release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios]
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: taskora-release-aab-${{ github.run_number }}
          path: artifacts/android

      - name: 📥 Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: taskora-release-apk-${{ github.run_number }}
          path: artifacts/android

      - name: 📥 Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: taskora-ios-ipa-${{ github.run_number }}
          path: artifacts/ios

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Taskora ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/android/app-release.apk
            artifacts/android/app-release.aab
            artifacts/ios/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
