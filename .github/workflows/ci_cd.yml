name: Taskora CI/CD

# ─────────────────────────────────────────────────────────────
#  Triggers
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'           # e.g. v1.2.3  → triggers release jobs
  pull_request:
    branches: [main, develop]
  workflow_dispatch:      # Allows manual trigger from GitHub Actions tab

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────
#  Shared env
# ─────────────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: '3.32.6'
  JAVA_VERSION: '17'

# ══════════════════════════════════════════════════════════════
#  JOB 1 — Quality Gate  (runs on every push / PR)
# ══════════════════════════════════════════════════════════════
jobs:
  quality:
    name: 🔍 Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🛠️ Install lcov
        run: sudo apt-get install -y lcov

      - name: 🔍 Dart analyze
        run: flutter analyze --fatal-infos

      - name: 🧪 Unit & widget tests
        run: flutter test --coverage

      - name: 📊 Check test coverage (> 45%)
        run: |
          # Use lcov-summary or a simple grep to check percentage
          COVERAGE=$(lcov --summary coverage/lcov.info | grep lines | cut -d ' ' -f 4 | cut -d '%' -f 1)
          echo "Current coverage: $COVERAGE%"
          if [ $(echo "$COVERAGE < 45" | bc -l) -eq 1 ]; then
            echo "❌ Coverage is below target threshold (45%)!"
            exit 1
          fi

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
          files: coverage/lcov.info
          fail_ci_if_error: false

# ══════════════════════════════════════════════════════════════
#  JOB 2 — Android Build  (debug on every push, release on tag)
# ══════════════════════════════════════════════════════════════
  android:
    name: 🤖 Android Build
    runs-on: ubuntu-latest
    needs: quality
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
      HAS_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD != '' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      # ── Debug APK (always) ──────────────────────────────────
      - name: 🔨 Build Debug APK
        run: flutter build apk --debug

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: taskora-debug-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # ── Decode keystore (only if secret is present) ──────────
      - name: 🔑 Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/taskora-release.jks

      - name: 📝 Create key.properties
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && env.HAS_PASSWORD == 'true'
        run: |
          cat > android/key.properties <<EOF
          storeFile=taskora-release.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # ── Release APK (signed only if properties exist) ────────
      - name: 🚀 Build Release APK
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
        run: |
          if [ -f "android/key.properties" ]; then
            flutter build apk --release --obfuscate --split-debug-info=build/debug-info --build-number=${{ github.run_number }}
          else
            echo "⚠️ Skipping signed release build: Secrets missing. Building unsigned APK instead."
            flutter build apk --release
          fi

      - name: 📤 Upload Release APK
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: taskora-release-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: 📦 Build App Bundle (AAB)
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && env.HAS_KEYSTORE == 'true'
        run: |
          flutter build appbundle --release --obfuscate --split-debug-info=build/debug-info --build-number=${{ github.run_number }}

      - name: 📤 Upload AAB
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: taskora-release-aab-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

# ══════════════════════════════════════════════════════════════
#  JOB 3 — iOS Build (DISABLED BY USER)
# ══════════════════════════════════════════════════════════════
#  ios:
#    ... (Disabled)

# ══════════════════════════════════════════════════════════════
#  JOB 4 — GitHub Release  (tags only)
# ══════════════════════════════════════════════════════════════
  release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [android]
    if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: taskora-release-aab-${{ github.run_number }}
          path: artifacts/android

      - name: 📥 Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: taskora-release-apk-${{ github.run_number }}
          path: artifacts/android

      - name: 📥 Download iOS IPA (Optional)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: taskora-ios-ipa-${{ github.run_number }}
          path: artifacts/ios

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Taskora ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/android/app-release.apk
            artifacts/android/app-release.aab
            artifacts/ios/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
